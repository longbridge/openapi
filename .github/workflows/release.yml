name: Release
on:
  push:
    branches:
      - release-python-nodejs

jobs:
  build-python-sdk:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        runs-on:
          [
            "windows-latest",
            "ubuntu-24.04",
            "ubuntu-24.04-arm",
            "macos-15",
            "macos-15-intel",
          ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: -i python --release --out dist -m python/Cargo.toml
      - name: Install built wheel
        run: |
          pip install longbridge --no-index --find-links dist --force-reinstall
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.runs-on }}-${{ matrix.python-version }}
          path: dist

  build-python-sdk-musl:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Setup QEMU
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build wheels (musl)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: -i python${{ matrix.python-version }} --release --out dist -m python/Cargo.toml
      - name: Install built wheel
        run: |
          docker run --rm \
            --platform ${{ matrix.target == 'aarch64-unknown-linux-musl' && 'linux/arm64' || 'linux/amd64' }} \
            -v $(pwd)/dist:/dist \
            python:${{ matrix.python-version }}-alpine \
            sh -c "pip install --upgrade pip && pip install longbridge --no-index --find-links /dist --force-reinstall && python -c 'import longbridge'"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musl-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  build-nodejs-sdk:
    strategy:
      fail-fast: true
      matrix:
        settings:
          - host: ubuntu-24.04
          - host: ubuntu-24.04-arm
          - host: macos-15
          - host: macos-15-intel
          - host: windows-latest
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup node
        uses: actions/setup-node@v6
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 24
          check-latest: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: ${{ matrix.settings.target }}

      - name: Install dependencies
        working-directory: nodejs
        run: yarn install --ignore-scripts --frozen-lockfile --registry https://registry.npmjs.org --network-timeout 300000

      - name: Build
        if: ${{ matrix.settings.host != 'macos-15' }}
        working-directory: nodejs
        run: yarn build:debug

      - name: Build
        if: ${{ matrix.settings.host == 'macos-15' }}
        working-directory: nodejs
        run: yarn build:debug --target aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.host }}
          path: nodejs/longbridge.*.node

  build:
    needs:
      - build-python-sdk
      - build-python-sdk-musl
      - build-nodejs-sdk
    runs-on: ubuntu-24.04
    steps:
      - run: echo "All builds are done"

  publish-python-sdk:
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/longbridge
    permissions:
      id-token: write
    needs:
      - build
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: Publish to PyPi
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-nodejs-sdk:
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - uses: actions/checkout@v4
      - name: Update versions
        run: node ./.github/misc/update_jssdk_version.mjs $(sed -nE 's/^\s*version = "(.*?)"/\1/p' Cargo.toml)
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          check-latest: true
      - name: Install napi-rs/cli
        run: npm install -g @napi-rs/cli
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./nodejs/artifacts
          pattern: bindings-*
          merge-multiple: true
      - name: Move artifacts
        run: napi artifacts
        working-directory: ./nodejs
      - name: List packages
        run: ls -R ./npm
        shell: bash
        working-directory: ./nodejs
      - name: Publish
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          npm publish --access public
        working-directory: ./nodejs
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
